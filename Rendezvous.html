<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rendez-vous</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="index.html">Hôpital Santé+</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
                        <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                        <li class="nav-item"><a class="nav-link" href="equipe.html">Équipe</a></li>
                        <li class="nav-item"><a class="nav-link active" href="rendezvous.html">Rendez-vous</a></li>
                        <li class="nav-item"><a class="nav-link" href="urgences.html">Urgences</a></li>
                        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section class="container mt-5">
            <h1 class="text-center mb-4">Prendre Rendez-vous</h1>
            <form>
                <div class="mb-3">
                    <label for="nom" class="form-label">Nom</label>
                    <input type="text" id="nom" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="prenom" class="form-label">Prénom</label>
                    <input type="text" id="prenom" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="tel" class="form-label">Téléphone</label>
                    <input type="tel" id="tel" class="form-control" pattern="[0-9]{8}" required>
                </div>
                <div class="mb-3">
                    <label for="date" class="form-label">Date du rendez-vous</label>
                    <input type="date" id="date" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="service" class="form-label">Service</label>
                    <select id="service" class="form-select">
                        <option>Médecine générale</option>
                        <option>Pédiatrie</option>
                        <option>Chirurgie</option>
                        <option>Cardiologie</option>
                        <option>Urgences</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="medecin" class="form-label">Médecin</label>
                    <select id="medecin" class="form-select">
                        <option>Dr Jean Pierre</option>
                        <option>Dr Marie Dubois</option>
                        <option>Dr Alain Moreau</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="motif" class="form-label">Motif</label>
                    <textarea id="motif" class="form-control"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Envoyer</button>
            </form>
        </section>
    </main>
    <footer class="bg-dark text-white text-center p-3">
        <p>© Hôpital Santé+</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
