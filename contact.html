<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="index.html">Hôpital Santé+</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
                        <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
                        <li class="nav-item"><a class="nav-link" href="equipe.html">Équipe</a></li>
                        <li class="nav-item"><a class="nav-link" href="Rendezvous.html">Rendez-vous</a></li>
                        <li class="nav-item"><a class="nav-link" href="Urgences.html">Urgences</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="container mt-5">
            <h1 class="text-center mb-4">Contactez-nous</h1>
            <p class="text-center">Adresse: 123 Rue de la Sante, Hopital Les Cayes Haiti</p>
            <p class="text-center">Téléphone: +509 1234 5678</p>
            <p class="text-center">Email:hopitalsante@gmail.com</p>

            <section class="map mb-5">
                <h2>Notre localisation</h2>
                <iframe src="https://maps.google.com/maps?q=Hopital%20Les%20Cayes%20Haiti&z=15&output=embed"
                    width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </section>

            <!-- Formulaire de contact -->
            <form class="row g-3">
                <div class="col-md-6">
                    <label for="nom" class="form-label">Nom complet</label>
                    <input type="text" class="form-control" id="nom" name="nom" required>
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Adresse email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <div class="col-md-6">
                    <label for="telephone" class="form-label">Téléphone</label>
                    <input type="tel" class="form-control" id="telephone" name="telephone" placeholder="+509 ..." required>
                </div>

                <div class="col-md-6">
                    <label for="service" class="form-label">Service concerné</label>
                    <select id="service" name="service" class="form-select" required>
                        <option value="">-- Choisissez un service --</option>
                        <option value="urgences">Urgences</option>
                        <option value="consultations">Consultations</option>
                        <option value="laboratoire">Laboratoire</option>
                        <option value="administration">Administration</option>
                    </select>
                </div>

                <div class="col-12">
                    <label for="message" class="form-label">Votre message</label>
                    <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Envoyer</button>
                </div>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
